# ---------------------------------------------------------------------------
# CloudFormation Git sync - deployment file
# ---------------------------------------------------------------------------
# This file describes how the bem12-autoscaling-web stack is deployed when the
# Git repository is synced via CloudFormation Git sync. CloudFormation reads
# this file from the configured branch and creates / updates the stack
# automatically whenever the file (or the referenced template) changes.
#
# Reference:
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/git-sync.html
# ---------------------------------------------------------------------------

template-file-path: ./autoscaling-web-tier.yaml

parameters:
  # Auto Scaling sizing required by the spec: min 1 / desired 1 / max 4
  MinSize: "1"
  DesiredCapacity: "1"
  MaxSize: "4"

  # Scale out when average CPU utilization exceeds 30%
  CpuTargetUtilization: "30"

  # Compute / AMI defaults - override per environment if needed.
  InstanceType: t3.micro
  LatestAmiId: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  # Network defaults - override here for non-default environments.
  VpcCidr: 10.0.0.0/16
  PublicSubnet1Cidr: 10.0.1.0/24
  PublicSubnet2Cidr: 10.0.2.0/24
  PrivateSubnet1Cidr: 10.0.11.0/24
  PrivateSubnet2Cidr: 10.0.12.0/24

tags:
  Project: BEM12-Lab-1
  Workload: autoscaling-web-tier
  ManagedBy: cloudformation-git-sync
